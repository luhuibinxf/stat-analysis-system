<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>统计系统 - 登录</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: Microsoft YaHei UI, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #01579b 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .login-container { 
            background: white; 
            padding: 50px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            width: 420px; 
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .hospital-info {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e3f2fd;
        }
        .hospital-info h3 {
            color: #1565c0;
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        h1 { 
            color: #1976d2; 
            text-align: center; 
            margin-bottom: 35px; 
            font-size: 28px;
            font-weight: 600;
        }
        .form-group { margin-bottom: 25px; }
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 500; 
            color: #333;
            font-size: 14px;
        }
        input[type='text'], input[type='password'] { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-size: 16px; 
            transition: all 0.3s ease;
        }
        input[type='text']:focus, input[type='password']:focus {
            border-color: #1976d2;
            outline: none;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
        }
        input[type='submit'] { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            margin-top: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        input[type='submit']:hover { 
            background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(25, 118, 210, 0.4);
        }
        input[type='submit']:active {
            transform: translateY(0);
        }
        .error-message { 
            background: #ffebee; 
            color: #c62828; 
            padding: 12px; 
            border-radius: 8px; 
            margin-top: 20px; 
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class='login-container'>
        <div class="hospital-info">
            <h3 id="hospitalName">系统所属医院：示例医院</h3>
        </div>
        <h1>统计系统登录</h1>
        <form id="loginForm">
            <div class='form-group'>
                <label for='username'>用户名 / 工号</label>
                <input type='text' id='username' name='username' placeholder="请输入用户名" required>
            </div>
            <div class='form-group'>
                <label for='password'>密码</label>
                <input type='password' id='password' name='password' placeholder="请输入密码" required>
            </div>
            <input type='submit' value='登 录'>
        </form>
        <div id='loading' class='loading'>正在登录</div>
        <div id='message' class='error-message'></div>
    </div>
    <script>
        fetch('/get-hospital-info')
            .then(res => res.json())
            .then(data => {
                if (data.success && data.hospitalName) {
                    document.getElementById('hospitalName').textContent = '系统所属医院：' + data.hospitalName;
                }
            })
            .catch(() => {});

        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            document.getElementById('message').textContent = decodeURIComponent(error);
            document.getElementById('message').style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            const loadingDiv = document.getElementById('loading');
            
            messageDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(response => response.json())
            .then(data => {
                loadingDiv.style.display = 'none';
                if (data.success) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('username', username);
                    sessionStorage.setItem('isAdmin', data.isAdmin);
                    window.location.href = '/';
                } else {
                    messageDiv.textContent = data.error || '用户名或密码错误';
                    messageDiv.style.display = 'block';
                }
            })
            .catch(error => {
                loadingDiv.style.display = 'none';
                messageDiv.textContent = '登录失败，请检查网络连接';
                messageDiv.style.display = 'block';
            });
        });
    </script>
</body>
</html>
