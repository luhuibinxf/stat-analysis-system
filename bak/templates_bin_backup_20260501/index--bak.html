<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析系统 - 配置中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/dailyAnalysis.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .navbar { background: rgba(255,255,255,0.95) !important; box-shadow: 0 4px 20px rgba(0,0,0,0.1); backdrop-filter: blur(10px); }
        .navbar-brand { font-weight: 600; font-size: 1.25rem; color: #333; }
        .card { border: none; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.25); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 1.5rem; }
        .card-header h3 { font-weight: 600; font-size: 1.5rem; margin: 0; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 12px 40px; border-radius: 10px; font-weight: 500; font-size: 1rem; transition: all 0.3s; }
        .btn-primary:hover { background: linear-gradient(135deg, #5568d3 0%, #6a3f91 100%); transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
        .btn-primary:active { transform: translateY(0); }
        .btn-outline-light { border-radius: 8px; font-weight: 500; }
        .menu-card { cursor: pointer; transition: all 0.35s ease; background: white; border-radius: 16px; }
        .menu-card:hover { transform: translateY(-8px); box-shadow: 0 20px 50px rgba(0,0,0,0.15); }
        .menu-card:active { transform: translateY(-4px); }
        .menu-icon { font-size: 3.5rem; margin-bottom: 15px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
        .modal-content { border-radius: 20px; border: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; padding: 1.25rem 1.5rem; }
        .modal-title { font-weight: 600; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .stat-value-sm { font-size: 1.2rem; font-weight: 600; color: #fff; }
        .stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.8); }
        .form-control, .form-select { border-radius: 10px; border: 2px solid #e0e0e0; padding: 12px 15px; font-size: 1rem; transition: all 0.3s; }
        .form-control:focus, .form-select:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15); outline: none; }
        .form-label { font-weight: 500; color: #444; margin-bottom: 0.5rem; }
        .login-card { width: 100%; max-width: 420px; }
        .login-card .card-body { padding: 2rem; }
        .login-icon { font-size: 4rem; text-align: center; margin-bottom: 1.5rem; color: #667eea; }
        .alert { border-radius: 10px; border: none; }
        .table { border-radius: 12px; overflow: hidden; }
        .table-dark { background: linear-gradient(135deg, #4a5568 0%, #2d3748 100%); }
        .table-dark th { border-bottom: none; font-weight: 600; }
        .table-striped > tbody > tr:nth-of-type(odd) { background-color: rgba(0,0,0,0.03); }
        .table-striped > tbody > tr:hover { background-color: rgba(102, 126, 234, 0.08); }
        .badge { font-weight: 500; padding: 4px 12px; border-radius: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">统计分析系统</a>
            <div class="d-flex">
                <span class="navbar-text me-3">当前用户: <strong id="currentUser">未登录</strong></span>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">退出登录</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div id="loginPanel">
            <div class="row justify-content-center min-vh-100 align-items-center">
                <div class="col-md-12 col-lg-4">
                    <div class="card login-card shadow-lg">
                        <div class="card-header text-center pb-0">
                            <div class="login-icon mb-2">🔐</div>
                            <h3 class="mb-1">系统登录</h3>
                            <p class="text-white/80 text-sm mt-1">统计分析系统</p>
                        </div>
                        <div class="card-body">
                            <div class="mb-4">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
                            </div>
                            <div class="mb-5">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" placeholder="请输入密码" autocomplete="current-password">
                            </div>
                            <button class="btn btn-primary w-100 py-3" onclick="login()">登 录</button>
                            <div id="loginError" class="mt-4 alert alert-danger" style="display: none;"></div>
                        </div>
                        <div class="card-footer bg-gray-50 text-center text-muted text-sm">
                            系统版本 v1.0.5
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="mainMenu" style="display: none;">
            <h2 class="text-center text-white mb-5">配置中心</h2>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card menu-card p-4 text-center" onclick="showUserConfig()">
                        <div class="menu-icon">👥</div>
                        <h4>用户配置和维护</h4>
                        <p class="text-muted">管理系统用户</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card menu-card p-4 text-center" onclick="showPermissionConfig()">
                        <div class="menu-icon">🔐</div>
                        <h4>权限维护</h4>
                        <p class="text-muted">管理用户权限</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card menu-card p-4 text-center" onclick="showParamConfig()">
                        <div class="menu-icon">⚙️</div>
                        <h4>参数配置</h4>
                        <p class="text-muted">系统参数设置</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card menu-card p-4 text-center" onclick="DailyAnalysis.init()">
                        <div class="menu-icon">📊</div>
                        <h4>检查每日分析</h4>
                        <p class="text-muted">检查统计查询</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card menu-card p-4 text-center" onclick="showComplexConfig()">
                        <div class="menu-icon">📋</div>
                        <h4>复杂存储配置</h4>
                        <p class="text-muted">存储过程管理</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card menu-card p-4 text-center" onclick="showServerConfig()">
                        <div class="menu-icon">🖥️</div>
                        <h4>服务器配置</h4>
                        <p class="text-muted">服务器参数设置</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="configPanel" style="display: none;">
            <div class="mb-4">
                <button class="btn btn-secondary" onclick="goBack()">← 返回</button>
                <h2 id="panelTitle" class="text-white d-inline ms-3"></h2>
            </div>
            <div id="panelContent"></div>
        </div>
    </div>

    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">用户管理</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userId">
                        <div class="mb-3">
                            <label>用户名</label>
                            <input type="text" class="form-control" id="userUsername" required>
                        </div>
                        <div class="mb-3">
                            <label>密码</label>
                            <input type="password" class="form-control" id="userPassword">
                            <small class="text-muted">不填则不修改密码</small>
                        </div>
                        <div class="mb-3">
                            <label>角色</label>
                            <select class="form-select" id="userRole">
                                <option value="admin">管理员</option>
                                <option value="user">普通用户</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label>状态</label>
                            <select class="form-select" id="userStatus">
                                <option value="active">启用</option>
                                <option value="inactive">禁用</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveUser()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        var currentUser = null;

        function login(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            
            var username = $('#username').val();
            var password = $('#password').val();
            
            $.ajax({
                url: '/login',
                type: 'POST',
                contentType: 'application/json',
                dataType: 'json',
                data: JSON.stringify({username: username, password: password}),
                success: function(resp) {
                    console.log('Login response:', resp);
                    if (resp.success) {
                        currentUser = {username: username, isAdmin: resp.isAdmin};
                        $('#currentUser').text(username);
                        $('#loginPanel').hide();
                        $('#mainMenu').show();
                    } else {
                        $('#loginError').text('用户名或密码错误').show();
                    }
                },
                error: function(xhr, status, error) {
                    console.error('Login error:', status, error);
                    $('#loginError').text('连接服务器失败: ' + error).show();
                }
            });
            
            return false;
        }

        function logout() {
            currentUser = null;
            $('#currentUser').text('未登录');
            $('#mainMenu').hide();
            $('#configPanel').hide();
            $('#loginPanel').show();
            $('#username').val('');
            $('#password').val('');
            $('#loginError').hide();
        }

        function goBack() {
            $('#configPanel').hide();
            $('#mainMenu').show();
        }

        function showUserConfig() {
            history.pushState({page: 'userConfig'}, '用户配置', '#user-config');
            $('#mainMenu').hide();
            $('#configPanel').show();
            $('#panelTitle').text('用户配置和维护');
            loadUsers();
        }

        function loadUsers() {
            $.ajax({
                url: '/get-users',
                type: 'GET',
                success: function(response) {
                    try {
                        var resp = typeof response === 'string' ? JSON.parse(response) : response;
                        if (resp.success) {
                            var html = '<div class="bg-white rounded-3 p-4">';
                            html += '<button class="btn btn-primary mb-3" onclick="addUser()">添加用户</button>';
                            html += '<table class="table table-striped">';
                            html += '<thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>操作</th></tr></thead><tbody>';
                            resp.data.forEach(function(user) {
                                html += '<tr>';
                                html += '<td>' + user.id + '</td>';
                                html += '<td>' + user.username + '</td>';
                                html += '<td>' + (user.role === 'admin' ? '管理员' : '普通用户') + '</td>';
                                html += '<td>' + (user.status === 'active' ? '启用' : '禁用') + '</td>';
                                html += '<td>';
                                html += '<button class="btn btn-sm btn-primary" onclick="editUser(' + user.id + ', \'' + user.username + '\', \'' + user.role + '\', \'' + user.status + '\')">编辑</button>';
                                if (user.username !== 'lhbdb') {
                                    html += '<button class="btn btn-sm btn-danger ms-1" onclick="deleteUser(' + user.id + ')">删除</button>';
                                }
                                html += '</td></tr>';
                            });
                            html += '</tbody></table></div>';
                            $('#panelContent').html(html);
                        }
                    } catch (e) {
                        $('#panelContent').html('<div class="alert alert-danger">加载失败</div>');
                    }
                }
            });
        }

        function addUser() {
            $('#userId').val('');
            $('#userUsername').val('');
            $('#userPassword').val('');
            $('#userRole').val('user');
            $('#userStatus').val('active');
            $('#userModal').modal('show');
        }

        function editUser(id, username, role, status) {
            $('#userId').val(id);
            $('#userUsername').val(username);
            $('#userPassword').val('');
            $('#userRole').val(role);
            $('#userStatus').val(status);
            $('#userModal').modal('show');
        }

        function saveUser() {
            var id = $('#userId').val();
            var username = $('#userUsername').val();
            var password = $('#userPassword').val();
            var role = $('#userRole').val();
            var status = $('#userStatus').val();
            
            var url = id ? '/update-user' : '/add-user';
            $.ajax({
                url: url,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({id: id, username: username, password: password, role: role, status: status}),
                success: function(response) {
                    try {
                        var resp = typeof response === 'string' ? JSON.parse(response) : response;
                        if (resp.success) {
                            $('#userModal').modal('hide');
                            loadUsers();
                        } else {
                            alert(resp.error);
                        }
                    } catch (e) {
                        alert('保存失败');
                    }
                }
            });
        }

        function deleteUser(id) {
            if (confirm('确定要删除此用户吗？')) {
                $.ajax({
                    url: '/delete-user',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({id: id}),
                    success: function(response) {
                        try {
                            var resp = typeof response === 'string' ? JSON.parse(response) : response;
                            if (resp.success) {
                                loadUsers();
                            } else {
                                alert(resp.error);
                            }
                        } catch (e) {
                            alert('删除失败');
                        }
                    }
                });
            }
        }

        function showPermissionConfig() {
            history.pushState({page: 'permissionConfig'}, '权限配置', '#permission-config');
            $('#mainMenu').hide();
            $('#configPanel').show();
            $('#panelTitle').text('权限维护');
            $('#panelContent').html('<p class="text-white">权限配置功能开发中...</p>');
        }

        function showParamConfig() {
            history.pushState({page: 'paramConfig'}, '参数配置', '#param-config');
            $('#mainMenu').hide();
            $('#configPanel').show();
            $('#panelTitle').text('参数配置');
            $('#panelContent').html('<p class="text-white">参数配置功能开发中...</p>');
        }

        function showComplexConfig() {
            history.pushState({page: 'complexConfig'}, '复杂存储配置', '#complex-config');
            $('#mainMenu').hide();
            $('#configPanel').show();
            $('#panelTitle').text('复杂存储配置');
            var html = `
                <div class="bg-white rounded-3 p-4">
                    <ul class="nav nav-tabs" id="configTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="procRegistryTab" data-bs-toggle="tab" data-bs-target="#procRegistry" type="button">存储注册</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="pageConfigTab" data-bs-toggle="tab" data-bs-target="#pageConfig" type="button">页面配置</button>
                        </li>
                    </ul>
                    <div class="tab-content mt-3">
                        <div class="tab-pane fade show active" id="procRegistry">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <input type="text" class="form-control" placeholder="搜索存储过程..." id="procSearch">
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-primary w-100">注册存储过程</button>
                                </div>
                                <div class="col-md-3">
                                    <button class="btn btn-secondary w-100">刷新列表</button>
                                </div>
                            </div>
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>名称</th>
                                        <th>类别</th>
                                        <th>参数</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>usp_GetDailyAnalysis</td>
                                        <td>每日分析</td>
                                        <td>startDate, endDate, system</td>
                                        <td><span class="badge bg-success">已注册</span></td>
                                        <td>
                                            <button class="btn btn-sm btn-info">编辑</button>
                                            <button class="btn btn-sm btn-danger">删除</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>usp_GetDepartmentStats</td>
                                        <td>科室统计</td>
                                        <td>startDate, endDate</td>
                                        <td><span class="badge bg-success">已注册</span></td>
                                        <td>
                                            <button class="btn btn-sm btn-info">编辑</button>
                                            <button class="btn btn-sm btn-danger">删除</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>usp_GetDoctorStats</td>
                                        <td>医生统计</td>
                                        <td>startDate, endDate, doctorType</td>
                                        <td><span class="badge bg-success">已注册</span></td>
                                        <td>
                                            <button class="btn btn-sm btn-info">编辑</button>
                                            <button class="btn btn-sm btn-danger">删除</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="tab-pane fade" id="pageConfig">
                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <button class="btn btn-primary w-100">添加页面</button>
                                </div>
                            </div>
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>页面名称</th>
                                        <th>路径</th>
                                        <th>显示顺序</th>
                                        <th>状态</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>每日分析</td>
                                        <td>/daily-analysis</td>
                                        <td>1</td>
                                        <td><span class="badge bg-success">启用</span></td>
                                        <td>
                                            <button class="btn btn-sm btn-info">编辑</button>
                                            <button class="btn btn-sm btn-warning">禁用</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>科室统计</td>
                                        <td>/department-statistics</td>
                                        <td>2</td>
                                        <td><span class="badge bg-success">启用</span></td>
                                        <td>
                                            <button class="btn btn-sm btn-info">编辑</button>
                                            <button class="btn btn-sm btn-warning">禁用</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            $('#panelContent').html(html);
        }

        function showServerConfig() {
            history.pushState({page: 'serverConfig'}, '服务器配置', '#server-config');
            $('#mainMenu').hide();
            $('#configPanel').show();
            $('#panelTitle').text('服务器配置');
            var html = `
                <div class="bg-white rounded-3 p-4">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h5>数据库连接配置</h5>
                            <div class="mb-3">
                                <label class="form-label">服务器地址</label>
                                <input type="text" class="form-control" id="dbServer" placeholder="localhost">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">数据库名称</label>
                                <input type="text" class="form-control" id="dbName" placeholder="WiNEX_PACS_Schema_Full">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="dbUser">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="dbPassword">
                            </div>
                            <button class="btn btn-primary" onclick="saveDbConfig()">保存配置</button>
                        </div>
                        <div class="col-md-6">
                            <h5>服务器端口配置</h5>
                            <div class="mb-3">
                                <label class="form-label">服务端口</label>
                                <input type="number" class="form-control" id="serverPort" placeholder="9094" min="1" max="65535">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">当前运行端口</label>
                                <input type="text" class="form-control" id="runningPort" readonly>
                            </div>
                            <button class="btn btn-primary" onclick="savePortConfig()">保存端口</button>
                            <p class="text-muted mt-3">端口修改需重启服务生效</p>
                        </div>
                    </div>
                    <div class="card bg-info/10 rounded-lg p-3">
                        <h6>📌 连接测试</h6>
                        <button class="btn btn-success" onclick="testDbConnection()">测试数据库连接</button>
                        <div id="connectionResult" class="mt-2"></div>
                    </div>
                </div>
            `;
            $('#panelContent').html(html);
            loadServerConfig();
        }

        function loadServerConfig() {
            $.ajax({
                url: '/get-port',
                type: 'GET',
                success: function(response) {
                    try {
                        var resp = typeof response === 'string' ? JSON.parse(response) : response;
                        if (resp.success) {
                            $('#serverPort').val(resp.data.port);
                            $('#runningPort').val(resp.data.runningPort);
                        }
                    } catch (e) {
                        console.error('加载端口配置失败');
                    }
                }
            });
        }

        function saveDbConfig() {
            var server = $('#dbServer').val();
            var database = $('#dbName').val();
            var username = $('#dbUser').val();
            var password = $('#dbPassword').val();
            
            $.ajax({
                url: '/update-db-config',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({server: server, database: database, username: username, password: password}),
                success: function(response) {
                    try {
                        var resp = typeof response === 'string' ? JSON.parse(response) : response;
                        if (resp.success) {
                            alert('配置保存成功，重启程序后生效');
                        } else {
                            alert('保存失败: ' + resp.error);
                        }
                    } catch (e) {
                        alert('保存失败');
                    }
                }
            });
        }

        function savePortConfig() {
            var port = $('#serverPort').val();
            $.ajax({
                url: '/set-port',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({port: port}),
                success: function(response) {
                    try {
                        var resp = typeof response === 'string' ? JSON.parse(response) : response;
                        if (resp.success) {
                            alert('端口配置保存成功，重启程序后生效');
                        } else {
                            alert('保存失败: ' + resp.error);
                        }
                    } catch (e) {
                        alert('保存失败');
                    }
                }
            });
        }

        function testDbConnection() {
            $('#connectionResult').html('<span class="text-primary">正在测试连接...</span>');
            $.ajax({
                url: '/get-hospital-info',
                type: 'GET',
                success: function(response) {
                    try {
                        var resp = typeof response === 'string' ? JSON.parse(response) : response;
                        if (resp.success) {
                            $('#connectionResult').html('<span class="text-success">✓ 数据库连接成功</span>');
                        } else {
                            $('#connectionResult').html('<span class="text-danger">✗ 连接失败: ' + resp.error + '</span>');
                        }
                    } catch (e) {
                        $('#connectionResult').html('<span class="text-danger">✗ 连接失败</span>');
                    }
                },
                error: function() {
                    $('#connectionResult').html('<span class="text-danger">✗ 连接失败</span>');
                }
            });
        }

        window.onpopstate = function(event) {
            if (event.state) {
                switch(event.state.page) {
                    case 'userConfig':
                        showUserConfig();
                        break;
                    case 'permissionConfig':
                        showPermissionConfig();
                        break;
                    case 'paramConfig':
                        showParamConfig();
                        break;
                    case 'dailyAnalysis':
                        DailyAnalysis.init();
                        break;
                    case 'complexConfig':
                        showComplexConfig();
                        break;
                    case 'serverConfig':
                        showServerConfig();
                        break;
                }
            }
        };
    </script>
</body>
</html>
