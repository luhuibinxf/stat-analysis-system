<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 每日分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 30px; color: white; }
        .header h1 { font-size: 2.5rem; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .header p { opacity: 0.9; font-size: 1.1rem; }

        .query-panel { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); margin-bottom: 24px; }
        .query-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; color: #666; font-weight: 500; }
        .date-input { padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; transition: all 0.3s; }
        .date-input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn { padding: 10px 32px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(102,126,234,0.4); }
        .btn:active { transform: translateY(0); }
        .btn-secondary { background: #f3f4f6; color: #374151; }
        .btn-secondary:hover { background: #e5e7eb; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px; }
        .stat-card { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); text-align: center; transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
        .stat-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .stat-label { color: #6b7280; font-size: 14px; margin-bottom: 8px; }
        .stat-value { font-size: 2.5rem; font-weight: bold; }
        .stat-positive { color: #dc2626; }
        .stat-negative { color: #16a34a; }
        .stat-total { color: #1a73e8; }
        .stat-rate { color: #f59e0b; }

        .result-panel { background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 24px; }
        .panel-header { padding: 20px 24px; background: #f8fafc; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { font-size: 1.1rem; color: #1f2937; }
        .export-btn { padding: 6px 16px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }

        .table-container { overflow-x: auto; }
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th { background: #f8fafc; padding: 14px 16px; text-align: left; font-weight: 600; color: #374151; font-size: 13px; white-space: nowrap; position: sticky; top: 0; z-index: 10; }
        .result-table td { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
        .result-table tr:hover { background: #f9fafb; }
        .result-table .rate-high { color: #dc2626; font-weight: 600; }
        .result-table .rate-low { color: #16a34a; font-weight: 600; }
        .result-table .system-超声 { background: #dbeafe; color: #1d4ed8; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .result-table .system-放射 { background: #fef3c7; color: #d97706; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .result-table .system-内镜 { background: #dcfce7; color: #16a34a; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .result-table .system-病理 { background: #fce7f3; color: #be185d; padding: 4px 8px; border-radius: 4px; font-size: 12px; }

        .loading { text-align: center; padding: 60px; color: #9ca3af; }
        .loading-icon { font-size: 3rem; margin-bottom: 16px; animation: spin 2s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .chart-container { background: white; padding: 24px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); height: 450px; }
        
        .pagination { display: flex; justify-content: center; gap: 8px; padding: 20px; }
        .page-btn { padding: 8px 16px; border: 1px solid #e5e7eb; border-radius: 8px; background: white; cursor: pointer; transition: all 0.2s; }
        .page-btn:hover { background: #f3f4f6; }
        .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #e5e7eb; }
        .filter-select { padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 13px; }

        .summary-row { background: #f8fafc; font-weight: 600; }
        .summary-row td { border-top: 2px solid #e5e7eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 检查每日分析系统</h1>
            <p>实时数据分析与可视化平台</p>
        </div>

        <div class="query-panel">
            <div class="query-row">
                <div class="form-group">
                    <label><i class="fa fa-calendar"></i> 开始日期</label>
                    <input type="date" id="startDate" value="2026-04-01" class="date-input">
                </div>
                <div class="form-group">
                    <label><i class="fa fa-calendar"></i> 结束日期</label>
                    <input type="date" id="endDate" value="2026-04-30" class="date-input">
                </div>
                <div class="form-group">
                    <label><i class="fa fa-hospital-o"></i> 检查系统</label>
                    <select id="systemFilter" class="filter-select">
                        <option value="">全部系统</option>
                        <option value="UIS">超声</option>
                        <option value="RIS">放射</option>
                        <option value="EIS">内镜</option>
                        <option value="PIS">病理</option>
                        <option value="NMS">核医学</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fa fa-user-md"></i> 病人类型</label>
                    <select id="patientTypeFilter" class="filter-select">
                        <option value="">全部类型</option>
                        <option value="138138">门诊</option>
                        <option value="145235">住院</option>
                        <option value="138139">急诊</option>
                        <option value="138140">体检</option>
                    </select>
                </div>
                <button class="btn" onclick="loadData()">
                    <i class="fa fa-search"></i> 查询统计
                </button>
                <button class="btn btn-secondary" onclick="clearFilters()">
                    <i class="fa fa-refresh"></i> 重置筛选
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="color: #1a73e8;">📈</div>
                <div class="stat-label">总检查数</div>
                <div class="stat-value stat-total" id="totalCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: #dc2626;">🔴</div>
                <div class="stat-label">阳性数量</div>
                <div class="stat-value stat-positive" id="positiveCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: #16a34a;">🟢</div>
                <div class="stat-label">阴性数量</div>
                <div class="stat-value stat-negative" id="negativeCount">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: #f59e0b;">📊</div>
                <div class="stat-label">阳性率</div>
                <div class="stat-value stat-rate" id="positiveRate">-</div>
            </div>
        </div>

        <div class="result-panel">
            <div class="panel-header">
                <h2><i class="fa fa-table"></i> 统计分析结果</h2>
                <button class="export-btn" onclick="exportData()"><i class="fa fa-download"></i> 导出数据</button>
            </div>
            <div class="table-container">
                <div id="resultContainer" class="loading">
                    <div class="loading-icon">⏳</div>
                    <p>点击查询按钮加载数据...</p>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <div id="chart" style="height: 100%;"></div>
        </div>
    </div>

    <script>
        var chartInstance = null;
        var currentPage = 1;
        var totalPages = 1;
        var currentData = [];

        function loadData(page = 1) {
            var startDate = $('#startDate').val();
            var endDate = $('#endDate').val();
            var system = $('#systemFilter').val();
            var patientType = $('#patientTypeFilter').val();

            if (!startDate || !endDate) {
                alert('请选择日期范围');
                return;
            }

            currentPage = page;
            $('#resultContainer').html(`
                <div class="loading">
                    <div class="loading-icon">⏳</div>
                    <p>数据加载中...</p>
                </div>
            `);
            
            $.ajax({
                url: '/daily-analysis',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    startDate: startDate,
                    endDate: endDate,
                    system: system,
                    patientType: patientType,
                    pageIndex: page,
                    pageSize: 50
                }),
                success: function(response) {
                    try {
                        var data = typeof response === 'string' ? JSON.parse(response) : response;
                        if (data.success && data.data) {
                            currentData = data.data;
                            displayData(data.data);
                            updateStats(data.data);
                            renderChart(data.data);
                        } else {
                            $('#resultContainer').html(`
                                <div class="loading">
                                    <div style="font-size: 3rem;">📭</div>
                                    <p>没有查询到数据</p>
                                </div>
                            `);
                        }
                    } catch (e) {
                        console.error('数据解析失败:', e);
                        $('#resultContainer').html(`
                            <div class="loading">
                                <div style="font-size: 3rem;">❌</div>
                                <p>数据解析失败: ${e.message}</p>
                            </div>
                        `);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('请求失败:', status, error);
                    $('#resultContainer').html(`
                        <div class="loading">
                            <div style="font-size: 3rem;">❌</div>
                            <p>请求失败: ${error || '网络错误'}</p>
                        </div>
                    `);
                }
            });
        }

        function displayData(data) {
            if (!data || data.length === 0) {
                $('#resultContainer').html(`
                    <div class="loading">
                        <div style="font-size: 3rem;">📭</div>
                        <p>没有查询到数据</p>
                    </div>
                `);
                return;
            }

            var columns = ['系统', '报告医生', '审核医生', '技师', '执行科室', '检查类型', '病人类型', '结果状态', '任务数量', '阳性数量', '阴性数量', '阳性率'];
            var html = `
                <table class="result-table">
                    <thead>
                        <tr>
                            ${columns.map(col => `<th>${htmlEncode(col)}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(function(row) {
                html += '<tr>';
                columns.forEach(function(col) {
                    var value = row[col];
                    if (col === '阳性率') {
                        var rate = parseFloat(value) || 0;
                        var rateStr = rate.toFixed(2) + '%';
                        var rateClass = rate >= 50 ? 'rate-high' : 'rate-low';
                        html += `<td class="${rateClass}">${rateStr}</td>`;
                    } else if (col === '系统') {
                        var systemClass = row[col] ? `system-${row[col].replace(/\s/g, '')}` : '';
                        html += `<td><span class="${systemClass}">${htmlEncode(value || '')}</span></td>`;
                    } else if (col === '任务数量' || col === '阳性数量' || col === '阴性数量') {
                        html += `<td style="text-align: right; font-weight: 500;">${(parseInt(value) || 0).toLocaleString()}</td>`;
                    } else {
                        html += `<td>${htmlEncode(value !== null && value !== undefined ? value : '')}</td>`;
                    }
                });
                html += '</tr>';
            });

            var totals = calculateTotals(data);
            html += `
                    <tr class="summary-row">
                        <td colspan="8" style="text-align: right;">📊 合计</td>
                        <td style="text-align: right;">${totals.total.toLocaleString()}</td>
                        <td style="text-align: right;">${totals.positive.toLocaleString()}</td>
                        <td style="text-align: right;">${totals.negative.toLocaleString()}</td>
                        <td class="${totals.rate >= 50 ? 'rate-high' : 'rate-low'}">${totals.rate.toFixed(2)}%</td>
                    </tr>
                    </tbody>
                </table>
                <div style="padding: 16px; text-align: right; color: #666; font-size: 14px;">
                    显示第 ${(currentPage - 1) * 50 + 1} - ${Math.min(currentPage * 50, data.length + (currentPage - 1) * 50)} 条，共 ${data.length} 条记录
                </div>
            `;
            $('#resultContainer').html(html);
        }

        function calculateTotals(data) {
            var total = 0, positive = 0, negative = 0;
            data.forEach(function(row) {
                total += parseInt(row['任务数量']) || 0;
                positive += parseInt(row['阳性数量']) || 0;
                negative += parseInt(row['阴性数量']) || 0;
            });
            return {
                total: total,
                positive: positive,
                negative: negative,
                rate: total > 0 ? (positive / total * 100) : 0
            };
        }

        function updateStats(data) {
            var totals = calculateTotals(data);
            $('#positiveRate').text(totals.rate.toFixed(2) + '%');
            $('#totalCount').text(totals.total.toLocaleString());
            $('#positiveCount').text(totals.positive.toLocaleString());
            $('#negativeCount').text(totals.negative.toLocaleString());
        }

        function renderChart(data) {
            if (!data || data.length === 0) return;

            var container = document.getElementById('chart');
            if (!container) return;

            if (chartInstance) {
                chartInstance.dispose();
            }

            chartInstance = echarts.init(container);
            
            var systemData = {};
            data.forEach(function(row) {
                var system = row['系统'] || '未知';
                if (!systemData[system]) {
                    systemData[system] = { positive: 0, negative: 0, total: 0 };
                }
                systemData[system].positive += parseInt(row['阳性数量']) || 0;
                systemData[system].negative += parseInt(row['阴性数量']) || 0;
                systemData[system].total += parseInt(row['任务数量']) || 0;
            });

            var systems = Object.keys(systemData);
            var positiveData = systems.map(s => systemData[s].positive);
            var negativeData = systems.map(s => systemData[s].negative);
            var rateData = systems.map(s => systemData[s].total > 0 ? (systemData[s].positive / systemData[s].total * 100) : 0);

            var option = {
                title: { 
                    text: '🏥 各系统检查结果统计', 
                    left: 'center', 
                    textStyle: { fontSize: 18, fontWeight: 'bold', color: '#1f2937' } 
                },
                tooltip: { 
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        var result = `<strong>${params[0].name}</strong><br/>`;
                        params.forEach(function(param) {
                            result += `${param.marker} ${param.seriesName}: ${param.value}`;
                            if (param.seriesName === '阳性率') {
                                result += '%';
                            }
                            result += '<br/>';
                        });
                        return result;
                    }
                },
                legend: { data: ['阳性', '阴性', '阳性率(%)'], bottom: 10 },
                grid: { left: '3%', right: '4%', bottom: '15%', top: '12%', containLabel: true },
                xAxis: { 
                    type: 'category', 
                    data: systems, 
                    axisLabel: { fontSize: 13 },
                    axisLine: { lineStyle: { color: '#e5e7eb' } }
                },
                yAxis: [
                    { 
                        type: 'value', 
                        name: '数量',
                        axisLabel: { fontSize: 12 },
                        splitLine: { lineStyle: { color: '#f3f4f6' } }
                    },
                    { 
                        type: 'value', 
                        name: '阳性率(%)', 
                        min: 0, 
                        max: 100,
                        axisLabel: { fontSize: 12, formatter: '{value}%' },
                        splitLine: { show: false }
                    }
                ],
                series: [
                    { 
                        name: '阳性', 
                        type: 'bar', 
                        data: positiveData, 
                        itemStyle: { 
                            color: '#ef4444',
                            borderRadius: [4, 4, 0, 0]
                        }
                    },
                    { 
                        name: '阴性', 
                        type: 'bar', 
                        data: negativeData, 
                        itemStyle: { 
                            color: '#22c55e',
                            borderRadius: [4, 4, 0, 0]
                        }
                    },
                    { 
                        name: '阳性率(%)', 
                        type: 'line', 
                        yAxisIndex: 1, 
                        data: rateData, 
                        lineStyle: { color: '#f59e0b', width: 3 },
                        itemStyle: { color: '#f59e0b' },
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8
                    }
                ]
            };

            chartInstance.setOption(option);
            window.addEventListener('resize', function() { chartInstance && chartInstance.resize(); });
        }

        function clearFilters() {
            $('#startDate').val('2026-04-01');
            $('#endDate').val('2026-04-30');
            $('#systemFilter').val('');
            $('#patientTypeFilter').val('');
            loadData();
        }

        function exportData() {
            if (!currentData || currentData.length === 0) {
                alert('没有数据可导出');
                return;
            }

            var headers = ['系统', '报告医生', '审核医生', '技师', '执行科室', '检查类型', '病人类型', '结果状态', '任务数量', '阳性数量', '阴性数量', '阳性率'];
            var rows = currentData.map(row => headers.map(h => row[h] || ''));
            
            var csvContent = headers.join(',') + '\n';
            rows.forEach(row => {
                csvContent += row.map(cell => {
                    var str = String(cell);
                    return str.includes(',') ? `"${str}"` : str;
                }).join(',') + '\n';
            });

            var blob = new Blob([`\uFEFF${csvContent}`], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `每日分析_${$('#startDate').val()}_${$('#endDate').val()}.csv`;
            link.click();
        }

        function htmlEncode(str) {
            if (str === null || str === undefined) return '';
            if (typeof str !== 'string') return String(str);
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        $(document).ready(function() {
            loadData();
        });
    </script>
</body>
</html>
